<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DojoBJJ - Site em Construção</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-card">
        <div class="icon-box">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" y1="9" x2="20" y2="9"></line>
                <line x1="4" y1="15" x2="20" y2="15"></line>
                <line x1="10" y1="3" x2="8" y2="21"></line>
                <line x1="16" y1="3" x2="14" y2="21"></line>
            </svg>
        </div>

        <h1>Site em Construção</h1>
        <p>Estamos preparando algo incrível para você. Em breve, nosso site estará no ar com todas as novidades que sua academia precisa.</p>

        <div class="progress-wrapper">
            <span class="progress-label">Progresso</span>
            <div class="progress-track">
                <div class="progress-fill" id="progressBar">
                    <div class="progress-glow"></div>
                </div>
            </div>
            <span class="progress-percent">72%</span>
        </div>

        <form id="notifyForm" class="form-group">
            <div class="input-wrapper">
                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <input type="email" id="emailInput" placeholder="Seu melhor e-mail" required>
            </div>
            <button type="submit" id="notifyBtn">Avisar-me</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
