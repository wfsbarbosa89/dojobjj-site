<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DojoBJJ - Site em Construção</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container"></div>
    <div class="background-overlay"></div>
    
    <div class="main-content">
        <div class="icon-construction-box">
            <span class="icon-construction">#</span>
        </div>
        
        <h1>Site em Construção</h1>
        
        <p>Estamos preparando algo incrível para você. Em breve, nosso site estará no ar com todas as novidades.</p>
        
        <div class="progress-container">
            <span class="progress-label">Progresso</span>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <span class="progress-percent">72%</span>
        </div>
        
        <div class="form-container">
            <div class="email-input-group">
                <svg class="email-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                <input type="email" placeholder="Seu e-mail" id="emailInput">
            </div>
            <button id="notifyBtn">Avisar-me</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
